<!DOCTYPE html>
<html>

<head>
  <title>AcadLab IDE - Faculty Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/dashboard.css">

</head>

<body>

  <header class="navbar">
    <div class="logo">
      <div class="logo-icon">&lt;/&gt;</div>
      <span class="logo-text">APLMS</span>
    </div>

    <div class="nav-right">
      <span class="user-name"></span>
      <span class="department">Computer Science</span>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
  </header>

  <div class="container">

    <h1 class="welcome">Faculty Dashboard</h1>
    <p class="subtitle">Manage labs and review student submissions</p>

    <!-- STATS -->
    <div class="stats faculty-stats">

      <div class="stat-card">
        <div class="stat-icon icon-green">📄</div>
        <div>
          <h2></h2>
          <p>Active Labs</p>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon icon-blue">📊</div>
        <div>
          <h2 id="totalSubmissions">0</h2>
          <p>Total Submissions</p>
        </div>
      </div>

    </div>
    <div class="section-header">
      <h3 class="section-title">Labs Under Supervision</h3>
    </div>
    <div id="facultyLabContainer"></div>


  </div>

  </div>

  <div id="logoutModal"
  style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4);
         justify-content:center; align-items:center; z-index:1000;">

  <div style="background:#fff; padding:25px; border-radius:12px; width:350px; text-align:center;">
    <h3 style="margin-bottom:10px;">Confirm Logout</h3>
    <p style="margin-bottom:20px; color:#6b7280;">
      Are you sure you want to logout?
    </p>
    <div style="display:flex; justify-content:center; gap:15px;">
      <button id="cancelLogoutBtn" class="btn secondary">Cancel</button>
      <button id="confirmLogoutBtn" class="btn primary">Logout</button>
    </div>
  </div>
</div>

  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs,
  doc,
  getDoc,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { 
  getAuth, 
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Fetch config from main process
    const firebaseConfig = await window.electronAPI.getFirebaseConfig();

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* =========================
   AUTH + ROLE PROTECTION
========================= */

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const userDoc = await getDoc(doc(db, "users", user.uid));

  if (!userDoc.exists()) {
    await signOut(auth);
    window.location.href = "index.html";
    return;
  }

  const userData = userDoc.data();

  if (userData.role !== "faculty") {
    window.location.href = "student_dashboard.html";
    return;
  }

  document.querySelector(".user-name").innerText = userData.name || "Faculty";

  loadLabs(user.uid);
  countSubmissions(user.uid);
});

/* =========================
   LOAD LABS
========================= */

async function loadLabs(facultyId) {

  const container = document.getElementById("facultyLabContainer");
  container.innerHTML = "";

  const q = query(collection(db, "labs"), where("faculty_id", "==", facultyId));
  const querySnapshot = await getDocs(q);

  let activeLabs = 0;

  querySnapshot.forEach((docSnap) => {
    activeLabs++;

    const data = docSnap.data();

    const div = document.createElement("div");
    div.className = "lab-card";

    div.innerHTML = `
      <div class="lab-info">
        <h4><strong>${data.title}</strong></h4>
      </div>

      <div class="lab-actions">
        <a href="lab_experiments.html?id=${docSnap.id}" class="btn primary">Open →</a>
      </div>
    `;

    container.appendChild(div);
  });

  document.querySelector(".stat-card h2").innerText = activeLabs;
}

/* =========================
   COUNT SUBMISSIONS
========================= */
async function countSubmissions(facultyId) {
    try {
        // We need all labs by this faculty to find their assignments
        const labQ = query(collection(db, "labs"), where("faculty_id", "==", facultyId));
        const labSnap = await getDocs(labQ);
        const labIds = labSnap.docs.map(d => d.id);

        if (labIds.length === 0) return;

        // Find all assignments for these labs
        const assignQ = query(collection(db, "assignments"), where("lab_id", "in", labIds));
        const assignSnap = await getDocs(assignQ);
        const assignIds = assignSnap.docs.map(d => d.id);

        if (assignIds.length === 0) return;

        // Count all submissions for these assignments
        // NOTE: Firestore 'in' query supports max 10-30 items depending on version.
        // For a simple count, let's query the global 'submissions' collection
        // But 'submissions' contains students ID + assign ID.
        // We can query submissions where assignmentId is in the list.
        
        let total = 0;
        // Batch queries of 10 if there are many assignments
        for (let i = 0; i < assignIds.length; i += 10) {
            const batch = assignIds.slice(i, i + 10);
            const subQ = query(collection(db, "submissions"), where("assignmentId", "in", batch));
            const subSnap = await getDocs(subQ);
            total += subSnap.size;
        }

        document.getElementById("totalSubmissions").innerText = total;
    } catch (err) {
        console.error("Error counting submissions:", err);
    }
}


/* =========================
   LOGOUT WITH CONFIRMATION
========================= */

// Open confirmation modal
document.getElementById("logoutBtn").addEventListener("click", () => {
  document.getElementById("logoutModal").style.display = "flex";
});

// Cancel logout
document.getElementById("cancelLogoutBtn").addEventListener("click", () => {
  document.getElementById("logoutModal").style.display = "none";
});

// Confirm logout
document.getElementById("confirmLogoutBtn").addEventListener("click", async () => {
  try {
    await signOut(auth);
    // Redirect handled by onAuthStateChanged
  } catch (error) {
    console.error("Logout error:", error);
  }
});

</script>>

</body>

</html>
