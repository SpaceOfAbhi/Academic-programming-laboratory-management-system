<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcadLab IDE</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">


  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #111827;
    }

    /* NAVBAR */
    .navbar {
      height: 70px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 40px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 18px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: #e6f9f2;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #10b981;
      font-weight: bold;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 30px;
      font-size: 14px;
      color: #374151;
    }

    .logout {
      cursor: pointer;
    }

    /* MAIN CONTAINER */
    .container {
      max-width: 950px;
      margin: 60px auto;
    }

    .welcome h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .welcome p {
      color: #6b7280;
      margin-bottom: 35px;
    }

    /* STATS */
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 45px;
    }

    .stat-card {
      flex: 1;
      background: #ffffff;
      padding: 24px;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .stat-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .green-bg {
      background: #ecfdf5;
      color: #10b981;
    }

    .yellow-bg {
      background: #fef3c7;
      color: #f59e0b;
    }

    .teal-bg {
      background: #e0f2fe;
      color: #0ea5e9;
    }

    .stat-number {
      font-size: 22px;
      font-weight: 600;
    }

    .stat-label {
      font-size: 14px;
      color: #6b7280;
    }

    /* LAB SECTION */
    .labs h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .lab-card {
      background: #ffffff;
      padding: 22px 25px;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      transition: 0.2s ease;
    }

    .lab-card:hover {
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
    }

    .lab-info h3 {
      font-size: 16px;
      margin-bottom: 6px;
    }

    .lab-info p {
      font-size: 13px;
      color: #6b7280;
    }

    .lab-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* BADGES */
    .badge {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 20px;
      font-weight: 500;
    }

    .in-progress {
      background: #fef3c7;
      color: #d97706;
    }

    .not-started {
      background: #fee2e2;
      color: #dc2626;
    }

    .submitted {
      background: #d1fae5;
      color: #059669;
    }

    /* BUTTONS */
    .btn {
      padding: 9px 18px;
      border-radius: 10px;
      font-size: 14px;
      border: none;
      cursor: pointer;
    }

    .primary {
      background: #10b981;
      color: #ffffff;
    }

    .primary:hover {
      background: #059669;
    }

    .secondary {
      background: #f3f4f6;
      color: #374151;
    }

    .secondary:hover {
      background: #e5e7eb;
    }

    .submitted-card {
      border: 2px solid #10b981;
    }

    .logout-btn {
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      color: #374151;
      padding: 6px 14px;
      border-radius: 6px;
      transition: 0.2s ease;
    }

    .logout-btn:hover {
      background: #fee2e2;
      color: #dc2626;
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="logo">
      <div class="logo-icon">&lt;/&gt;</div>
      APLMS
    </div>

    <div class="nav-right">

      <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
  </header>

  <main class="container">

    <section class="welcome">
      <h1>Welcome back, </h1>
      <p>Here are your lab assignments</p>
    </section>

    <section class="stats">
      <div class="stat-card">
        <div class="stat-icon green-bg">📘</div>
        <div>
          <div class="stat-number">3</div>
          <div class="stat-label">Total Labs</div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon yellow-bg">⏰</div>
        <div>
          <div class="stat-number">1</div>
          <div class="stat-label">In Progress</div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon teal-bg">✔</div>
        <div>
          <div class="stat-number">1</div>
          <div class="stat-label">Submitted</div>
        </div>
      </div>
    </section>

    <section class="labs">
      <h2>Assignments</h2>

      <div id="labContainer"></div>
      <div id="logoutModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4);
         justify-content:center; align-items:center; z-index:1000;">

        <div style="background:#fff; padding:25px; border-radius:12px; width:350px; text-align:center;">
          <h3 style="margin-bottom:10px;">Confirm Logout</h3>
          <p style="margin-bottom:20px; color:#6b7280;">
            Are you sure you want to logout?
          </p>
          <div style="display:flex; justify-content:center; gap:15px;">
            <button id="cancelLogoutBtn" class="btn secondary">Cancel</button>
            <button id="confirmLogoutBtn" class="btn primary">Logout</button>
          </div>
        </div>
      </div>
    </section>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
      import { getFirestore, doc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      // Fetch config from main process
    const firebaseConfig = await window.electronAPI.getFirebaseConfig();

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      onAuthStateChanged(auth, async (user) => {

        if (!user) {
          // Not logged in
          window.location.href = "index.html";
          return;
        }

        const userDoc = await getDoc(doc(db, "users", user.uid));

        if (!userDoc.exists()) {
          window.location.href = "index.html";
          return;
        }

        const role = userDoc.data().role;

        if (role !== "student") {
          window.location.href = "index.html";
        }

        const studentClass = userDoc.data().class || null;

        document.querySelector(".welcome h1").innerText =
          `Welcome back, ${userDoc.data().name}`;

        loadAssignments(studentClass);

      });


      async function loadAssignments(studentClass) {
        const labContainer = document.getElementById("labContainer");
        labContainer.innerHTML = "";

        let assignmentsMap = new Map();

        try {
            if (studentClass && studentClass.trim() !== "") {
                const trimmedClass = studentClass.trim();
                
                // 1. DIRECT QUERY: Assignments linked directly to class
                const directQ = query(collection(db, "assignments"), where("class", "==", trimmedClass));
                const directSnapshot = await getDocs(directQ);
                directSnapshot.forEach(doc => {
                    assignmentsMap.set(doc.id, { id: doc.id, ...doc.data() });
                });

                // 2. LAYERED QUERY: Find labs for this class, then their assignments
                const labsQ = query(collection(db, "labs"), where("class", "==", trimmedClass));
                const labsSnapshot = await getDocs(labsQ);
                const labIds = labsSnapshot.docs.map(doc => doc.id);

                if (labIds.length > 0) {
                    for (let i = 0; i < labIds.length; i += 10) {
                        const batch = labIds.slice(i, i + 10);
                        const aq = query(collection(db, "assignments"), where("lab_id", "in", batch));
                        const aSnapshot = await getDocs(aq);
                        aSnapshot.forEach(doc => {
                            if (!assignmentsMap.has(doc.id)) {
                                assignmentsMap.set(doc.id, { id: doc.id, ...doc.data() });
                            }
                        });
                    }
                }
            } else {
                // Fallback for students without class or empty class
                const querySnapshot = await getDocs(collection(db, "assignments"));
                querySnapshot.forEach(doc => {
                    assignmentsMap.set(doc.id, { id: doc.id, ...doc.data() });
                });
            }
        } catch (err) {
            console.error("Error loading experiments:", err);
            labContainer.innerHTML = `<p style="color:red; margin-top:20px;">Error loading experiments: ${err.message}</p>`;
            return;
        }

        const assignmentsRaw = Array.from(assignmentsMap.values());
        const assignments = [];

        // 3. DEFENSIVE CHECK: Verify each assignment's lab still exists
        // (Handles cases where lab was deleted but assignment document remained)
        if (assignmentsRaw.length > 0) {
            const validLabIds = new Set();
            // Fetch all labs for this class again to be sure (already fetched in layered query, but let's be explicit)
            const labsQ = query(collection(db, "labs"), where("class", "==", studentClass.trim()));
            const labsSnap = await getDocs(labsQ);
            labsSnap.forEach(lDoc => validLabIds.add(lDoc.id));

            for (const assign of assignmentsRaw) {
                if (assign.lab_id && validLabIds.has(assign.lab_id)) {
                    assignments.push(assign);
                }
            }
        }

        if (assignments.length === 0) {
            labContainer.innerHTML = `<p style="color:#6b7280; margin-top:20px;">No experiments found for your class. Please contact your faculty.</p>`;
            // Update stats to 0
            const statNumbers = document.querySelectorAll(".stat-number");
            statNumbers.forEach(n => n.innerText = "0");
            return;
        }

        // Fetch user's submissions to check status
        const subSnapshot = await getDocs(collection(db, "users", auth.currentUser.uid, "submissions"));
        const subMap = {};
        let submittedCount = 0;
        let inProgressCount = 0;

        subSnapshot.forEach(sDoc => {
            const sData = sDoc.data();
            subMap[sDoc.id] = sData.status;
            if (sData.status === "submitted" || sData.status === "verified") submittedCount++;
            else if (sData.status === "in-progress") inProgressCount++;
        });

        let totalLabs = 0;

        assignments.forEach((assign) => {
          totalLabs++;
          const status = subMap[assign.id] || "not-started";
          
          let badgeHtml = "";
          let cardClass = "lab-card";
          
          if (status === "verified") {
              badgeHtml = `<span class="badge submitted">Verified ✔</span>`;
              cardClass += " submitted-card";
          } else if (status === "submitted") {
              badgeHtml = `<span class="badge submitted">Submitted</span>`;
              cardClass += " submitted-card";
          } else if (status === "in-progress") {
              badgeHtml = `<span class="badge in-progress">In Progress</span>`;
          } else {
              badgeHtml = `<span class="badge not-started">Not Started</span>`;
          }

          const card = document.createElement("div");
          card.className = cardClass;

          card.innerHTML = `
            <div class="lab-info">
                <h3>${assign.title} ${badgeHtml}</h3>
                <p>Language: ${assign.language}</p>
                <p>Description: ${assign.description}</p>
            </div>
            <div class="lab-actions">
                <button class="btn primary">${status === "verified" ? "View Code →" : "Open IDE →"}</button>
            </div>
        `;

          card.querySelector("button").addEventListener("click", () => {
            window.location.href = `assignment.html?id=${assign.id}`;
          });

          labContainer.appendChild(card);
        });

        // Update stats
        const statNumbers = document.querySelectorAll(".stat-number");
        statNumbers[0].innerText = totalLabs;
        statNumbers[1].innerText = inProgressCount;
        statNumbers[2].innerText = submittedCount;
      }

      // Open confirmation modal
      document.getElementById("logoutBtn").addEventListener("click", () => {
        document.getElementById("logoutModal").style.display = "flex";
      });

      // Cancel logout
      document.getElementById("cancelLogoutBtn").addEventListener("click", () => {
        document.getElementById("logoutModal").style.display = "none";
      });

      // Confirm logout
      document.getElementById("confirmLogoutBtn").addEventListener("click", async () => {
        try {
          await signOut(auth);
          // Redirect handled by onAuthStateChanged
        } catch (error) {
          console.error("Logout error:", error);
        }
      });
    </script>

  </main>

</body>

</html>
