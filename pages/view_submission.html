<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Submission - APLMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f5f7fb;
            color: #111827;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── NAVBAR ── */
        .navbar {
            height: 64px;
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 28px;
            flex-shrink: 0;
            z-index: 20;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            text-decoration: none;
            color: #111827;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: #e6f9f2;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #10b981;
            font-weight: 700;
        }

        .btn {
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: 0.15s;
        }

        .secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .secondary:hover {
            background: #e5e7eb;
        }

        /* ── AI EVALUATE BUTTON ── */
        .btn-ai {
            display: none;
            align-items: center;
            gap: 7px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .btn-ai:hover {
            background: linear-gradient(135deg, #4f52d6, #7c3aed);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            transform: translateY(-1px);
        }

        .btn-ai:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ── AI SCORE PILL (shown in navbar after evaluation) ── */
        .ai-score-pill {
            display: none;
            align-items: center;
            gap: 10px;
            background: #f9fafb;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            padding: 6px 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .ai-score-pill:hover {
            background: #f3f4f6;
            border-color: #d1d5db;
        }

        .ai-score-pill:hover .ai-pill-hint {
            opacity: 1;
        }

        .ai-score-number {
            font-size: 22px;
            font-weight: 800;
            line-height: 1;
        }

        .ai-score-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .ai-score-label {
            font-size: 10px;
            font-weight: 600;
            color: #9ca3af;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .ai-grade-chip {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            width: fit-content;
        }

        .grade-A {
            background: #d1fae5;
            color: #059669;
        }

        .grade-B {
            background: #dbeafe;
            color: #2563eb;
        }

        .grade-C {
            background: #fef9c3;
            color: #b45309;
        }

        .grade-D {
            background: #ffedd5;
            color: #c2410c;
        }

        .grade-F {
            background: #fee2e2;
            color: #dc2626;
        }

        .ai-pill-hint {
            font-size: 11px;
            color: #9ca3af;
            opacity: 0;
            transition: 0.2s;
        }

        /* ── SPINNER inside button ── */
        .spin-icon {
            width: 15px;
            height: 15px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── AI DETAILS DRAWER (below navbar, collapsible) ── */
        .ai-drawer {
            height: 0;
            overflow: hidden;
            background: #fff;
            border-bottom: 1px solid transparent;
            transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                border-color 0.35s;
            flex-shrink: 0;
            z-index: 15;
        }

        .ai-drawer.open {
            height: 120px;
            border-bottom-color: #e5e7eb;
        }

        .ai-drawer-inner {
            display: flex;
            align-items: center;
            gap: 32px;
            padding: 16px 28px;
            height: 120px;
        }

        /* Category breakdown in drawer */
        .drawer-cats {
            display: flex;
            gap: 20px;
            flex: 1;
        }

        .drawer-cat {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .drawer-cat-label {
            font-size: 11px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .drawer-cat-score {
            font-size: 18px;
            font-weight: 700;
            color: #111827;
            line-height: 1;
        }

        .drawer-cat-bar {
            height: 5px;
            background: #f3f4f6;
            border-radius: 10px;
            overflow: hidden;
        }

        .drawer-cat-fill {
            height: 100%;
            border-radius: 10px;
            width: 0%;
            transition: width 1.1s cubic-bezier(0.4, 0, 0.2, 1) 0.1s;
        }

        /* AI Feedback text area in drawer */
        .drawer-feedback {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border-left: 1px solid #f3f4f6;
            padding-left: 24px;
        }

        .drawer-feedback-label {
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .drawer-feedback-text {
            font-size: 13px;
            line-height: 1.55;
            color: #374151;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .drawer-close {
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: self-start;
            transition: 0.15s;
            flex-shrink: 0;
        }

        .drawer-close:hover {
            color: #374151;
            background: #f3f4f6;
        }

        /* ── MAIN LAYOUT ── */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .code-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e5e7eb;
            background: #282a36;
            min-width: 0;
        }

        .panel-header {
            background: #21222c;
            color: #f8f8f2;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .output-panel {
            width: 380px;
            background: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            min-height: 0;
        }

        .CodeMirror {
            height: 100% !important;
            font-size: 14px;
        }

        .terminal-content {
            flex: 1;
            padding: 20px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            overflow-y: auto;
            white-space: pre-wrap;
            min-height: 0;
            /* Essential for flex-based scrolling */
            scroll-behavior: auto;
        }

        /* ── TERMINAL SCROLLBAR ── */
        .terminal-content::-webkit-scrollbar {
            width: 10px;
        }

        .terminal-content::-webkit-scrollbar-track {
            background: #1e1e1e;
        }

        .terminal-content::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 5px;
            border: 2px solid #1e1e1e;
        }

        .terminal-content::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* ── VERIFY BUTTONS ── */
        .verified-badge {
            display: none;
            background: #d1fae5;
            color: #059669;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .verify-btn {
            display: none;
            background: #10b981;
            color: white;
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: 0.15s;
        }

        .verify-btn:hover {
            background: #059669;
        }

        /* ── LOADING INDICATOR in navbar ── */
        .ai-evaluating-badge {
            display: none;
            align-items: center;
            gap: 8px;
            background: #ede9fe;
            color: #6d28d9;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .ai-evaluating-badge .mini-spin {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(109, 40, 217, 0.3);
            border-top-color: #6d28d9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #111827;
            color: white;
            padding: 11px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 999;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div style="display:flex; align-items:center; gap:16px;">
            <a href="javascript:history.back()" class="btn secondary">← Back</a>
            <div class="logo">
                <div class="logo-icon">&lt;/&gt;</div>
                <span id="navInfo">Submission View</span>
            </div>
        </div>

        <div style="display:flex; align-items:center; gap:10px;">
            <span id="studentNameDisplay" style="font-weight:600; font-size:14px;">Loading...</span>

            <!-- Shown while evaluating -->
            <div class="ai-evaluating-badge" id="aiEvaluatingBadge">
                <div class="mini-spin"></div>
                Evaluating...
            </div>

            <!-- Score pill — shown after evaluation, click to toggle drawer -->
            <div class="ai-score-pill" id="aiScorePill" onclick="toggleDrawer()">
                <div class="ai-score-number" id="aiScoreNum" style="color:#10b981;">–</div>
                <div class="ai-score-meta">
                    <div class="ai-score-label">AI Score / 100</div>
                    <div class="ai-grade-chip grade-A" id="aiGradeChip">–</div>
                </div>
                <div class="ai-pill-hint">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <polyline points="6 9 12 15 18 9" />
                    </svg>
                </div>
            </div>

            <!-- Evaluate button -->
            <button class="btn-ai" id="aiEvalBtn" onclick="runAiEvaluation()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3" />
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14" />
                </svg>
                <div class="spin-icon" id="aiSpinner"></div>
                AI Evaluate
            </button>

            <button id="verifyBtn" class="btn verify-btn">Verify Output</button>
            <span id="verifiedBadge" class="verified-badge">✔ Verified</span>
        </div>
    </header>

    <!-- AI DETAILS DRAWER (hidden by default, opens below navbar) -->
    <div class="ai-drawer" id="aiDrawer">
        <div class="ai-drawer-inner">
            <div class="drawer-cats" id="drawerCats">
                <div class="drawer-cat">
                    <div class="drawer-cat-label">Logic Accuracy</div>
                    <div class="drawer-cat-score" id="dCatCorrect">–</div>
                    <div class="drawer-cat-bar">
                        <div class="drawer-cat-fill" id="dBarCorrect" style="background:#10b981;"></div>
                    </div>
                </div>
                <div class="drawer-cat">
                    <div class="drawer-cat-label">Output Correctness</div>
                    <div class="drawer-cat-score" id="dCatQuality">–</div>
                    <div class="drawer-cat-bar">
                        <div class="drawer-cat-fill" id="dBarQuality" style="background:#6366f1;"></div>
                    </div>
                </div>
                <div class="drawer-cat">
                    <div class="drawer-cat-label">Completeness</div>
                    <div class="drawer-cat-score" id="dCatEff">–</div>
                    <div class="drawer-cat-bar">
                        <div class="drawer-cat-fill" id="dBarEff" style="background:#f59e0b;"></div>
                    </div>
                </div>
                <div class="drawer-cat">
                    <div class="drawer-cat-label">Code Structure</div>
                    <div class="drawer-cat-score" id="dCatRead">–</div>
                    <div class="drawer-cat-bar">
                        <div class="drawer-cat-fill" id="dBarRead" style="background:#3b82f6;"></div>
                    </div>
                </div>
            </div>
            <div class="drawer-feedback">
                <div class="drawer-feedback-label">AI Feedback</div>
                <div class="drawer-feedback-text" id="dFeedback">–</div>
            </div>
            <button class="drawer-close" onclick="toggleDrawer()" title="Close">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
    </div>

    <!-- MAIN CODE + TERMINAL -->
    <main class="main-container">
        <section class="code-panel">
            <div class="panel-header">
                <span id="assignmentTitle">Loading...</span>
                <span id="langDisplay">Language</span>
            </div>
            <textarea id="codeEditor"></textarea>
        </section>
        <section class="output-panel">
            <div class="panel-header" style="background:#252526; border-left: 1px solid #333;">Terminal Output</div>
            <div class="terminal-content" id="terminalOutput"></div>
        </section>
    </main>

    <div class="toast" id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Fetch config from main process
        const firebaseConfig = await window.electronAPI.getFirebaseConfig();

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const submissionId = urlParams.get('id');

        window._submissionData = null;
        window._assignmentDesc = "";
        window._drawerOpen = false;

        const editor = CodeMirror.fromTextArea(document.getElementById("codeEditor"), {
            lineNumbers: true,
            theme: "dracula",
            readOnly: true,
            mode: "javascript"
        });

        if (submissionId) {
            loadSubmission();

            // Listen for AI evaluation status updates from main process
            if (window.electronAPI && window.electronAPI.onAIStatus) {
                window.electronAPI.onAIStatus((msg) => {
                    const badge = document.getElementById("aiEvaluatingBadge");
                    if (badge) {
                        badge.innerHTML = `<div class="mini-spin"></div> ${msg}`;
                        badge.style.display = "flex";
                    }
                });
            }
        }

        async function loadSubmission() {
            try {
                const subDoc = await getDoc(doc(db, "submissions", submissionId));
                if (!subDoc.exists()) { alert("Submission not found!"); return; }

                const data = subDoc.data();
                window._submissionData = data;

                document.getElementById("studentNameDisplay").innerText = data.studentName || "Student";
                document.getElementById("assignmentTitle").innerText = data.assignmentTitle || "Submission";
                document.getElementById("terminalOutput").innerText = data.terminalOutput || "No terminal output recorded.";

                if (data.assignmentId) {
                    try {
                        const aDoc = await getDoc(doc(db, "assignments", data.assignmentId));
                        if (aDoc.exists()) window._assignmentDesc = aDoc.data().description || "";
                    } catch (_) { }
                }

                if (data.status === "verified") {
                    document.getElementById("verifiedBadge").style.display = "inline-block";
                } else if (data.status === "submitted") {
                    document.getElementById("verifyBtn").style.display = "inline-block";
                }

                if (data.status === "submitted" || data.status === "verified") {
                    document.getElementById("aiEvalBtn").style.display = "flex";
                }

                // Load existing AI score
                if (data.aiScore !== undefined && data.aiScore !== null && data.aiFeedback) {
                    showScoreInNavbar(data.aiFeedback, false);
                }

                const lang = (data.language || "").toLowerCase();
                let mode = "javascript";
                if (lang.includes("python")) mode = "python";
                else if (lang.includes("c++") || lang.includes("cpp")) mode = "text/x-c++src";
                else if (lang.includes("c")) mode = "text/x-csrc";
                else if (lang.includes("java")) mode = "text/x-java";

                editor.setOption("mode", mode);
                editor.setValue(data.code || "// No code submitted");
                document.getElementById("langDisplay").innerText = lang.toUpperCase() || "CODE";

            } catch (err) {
                console.error(err);
                showToast("Error loading submission.");
            }
        }

        // Verify
        document.getElementById("verifyBtn").addEventListener("click", async () => {
            if (confirm("Confirm verification of this submission?")) {
                try {
                    const subRef = doc(db, "submissions", submissionId);
                    await updateDoc(subRef, { status: "verified", verifiedAt: serverTimestamp() });
                    const subSnap = await getDoc(subRef);
                    if (subSnap.exists()) {
                        const sd = subSnap.data();
                        try {
                            await updateDoc(doc(db, "users", sd.studentId, "submissions", sd.assignmentId), {
                                status: "verified", verifiedAt: serverTimestamp()
                            });
                        } catch (_) { }
                    }
                    showToast("Verified successfully!");
                    document.getElementById("verifiedBadge").style.display = "inline-block";
                    document.getElementById("verifyBtn").style.display = "none";
                } catch (err) {
                    console.error(err);
                    showToast("Failed to verify.");
                }
            }
        });

        // ── AI EVALUATION ──
        window.runAiEvaluation = async function () {
            const data = window._submissionData;
            if (!data) return;

            const code = data.code || "";
            const language = data.language || "code";
            const assignmentTitle = data.assignmentTitle || "Programming Assignment";
            const description = window._assignmentDesc || "No description available.";

            // Show loading state
            const evalBtn = document.getElementById("aiEvalBtn");
            const spinner = document.getElementById("aiSpinner");
            const evaluatingBadge = document.getElementById("aiEvaluatingBadge");

            evalBtn.disabled = true;
            spinner.style.display = "inline-block";
            evaluatingBadge.style.display = "flex";

            const prompt = `You are an AI instructor evaluating a student's programming submission.
Your goal is to provide a sensible score based JUST on the logic and the output generated.

Assignment: "${assignmentTitle}"
Description: "${description}"
Language: ${language}
Student Code:
\`\`\`
${code}
\`\`\`
Terminal Output (if any):
${data.terminalOutput || "None"}

Evaluate if the logic is sound and if the output matches the expected results for the assignment. 
IMPORTANT: Ignore any error statements or warnings in the terminal output that are NOT related to the actual logic or output (e.g., system warnings, compiler warnings about style, etc.).
Respond ONLY with valid JSON (no markdown).

Return this exact JSON structure:
{
  "score": <integer 0-100 based on logic/output>,
  "grade": "<A|B|C|D|F>",
  "correctness": <integer 0-100 for logic>,
  "quality": <integer 0-100 for output correctness>,
  "efficiency": <integer 0-100 for overall completion>,
  "readability": <integer 0-100 for code structure>,
  "feedback": "<1-2 sentence feedback focusing ONLY on the logic and output accuracy. Keep it very simple.>"
}

Scoring: Focus almost entirely on whether the code works (logic) and produces correct results (output). 
Grade: A>=90, B>=80, C>=65, D>=50, F<50`;

            try {
                let result;

                // Use Electron IPC (uses key from .env)
                if (window.electronAPI && window.electronAPI.callAI) {
                    result = await window.electronAPI.callAI({ prompt });
                } else {
                    // Fallback: direct fetch (unlikely in Electron but kept for reference)
                    const resp = await fetch(
                        "https://api.groq.com/openai/v1/chat/completions",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                "Authorization": `Bearer ${GROQ_API_KEY}`
                            },
                            body: JSON.stringify({
                                model: "llama-3.1-70b-versatile",
                                messages: [{ role: 'user', content: prompt }],
                                response_format: { type: 'json_object' }
                            })
                        }
                    );
                    if (!resp.ok) throw new Error(`API error ${resp.status}`);
                    const dataResp = await resp.json();
                    result = { text: dataResp.choices[0].message.content };
                }

                // Check for error returned by main process
                if (result && result.error) {
                    throw new Error(result.error);
                }

                const rawText = result.text || "";
                if (!rawText) throw new Error("Empty response from AI. Please try again.");

                const evaluation = JSON.parse(rawText);

                // Persist
                const payload = {
                    aiScore: evaluation.score,
                    aiFeedback: evaluation,
                    aiEvaluatedAt: serverTimestamp()
                };
                await updateDoc(doc(db, "submissions", submissionId), payload);
                if (data.studentId && data.assignmentId) {
                    try {
                        await updateDoc(doc(db, "users", data.studentId, "submissions", data.assignmentId), payload);
                    } catch (_) { }
                }

                window._submissionData.aiScore = evaluation.score;
                window._submissionData.aiFeedback = evaluation;

                showScoreInNavbar(evaluation, true);
                showToast("AI evaluation complete!");

            } catch (err) {
                console.error("AI eval error:", err);
                showToast("Evaluation failed: " + err.message);
            } finally {
                evalBtn.disabled = false;
                spinner.style.display = "none";
                evaluatingBadge.style.display = "none";
            }
        };

        function showScoreInNavbar(evaluation, animate) {
            const score = evaluation.score ?? 0;
            const grade = evaluation.grade ?? "F";

            // Score color
            let color = "#ef4444";
            if (score >= 80) color = "#10b981";
            else if (score >= 65) color = "#3b82f6";
            else if (score >= 50) color = "#f59e0b";

            const numEl = document.getElementById("aiScoreNum");
            const gradeEl = document.getElementById("aiGradeChip");

            numEl.style.color = color;
            gradeEl.className = "ai-grade-chip grade-" + grade;
            gradeEl.innerText = "Grade " + grade;

            if (animate) {
                let cur = 0;
                const step = Math.max(1, Math.ceil(score / 30));
                const iv = setInterval(() => {
                    cur = Math.min(cur + step, score);
                    numEl.innerText = cur;
                    if (cur >= score) clearInterval(iv);
                }, 40);
            } else {
                numEl.innerText = score;
            }

            // Populate drawer
            const cats = [
                { id: "dCatCorrect", bar: "dBarCorrect", val: evaluation.correctness ?? 0 },
                { id: "dCatQuality", bar: "dBarQuality", val: evaluation.quality ?? 0 },
                { id: "dCatEff", bar: "dBarEff", val: evaluation.efficiency ?? 0 },
                { id: "dCatRead", bar: "dBarRead", val: evaluation.readability ?? 0 }
            ];
            cats.forEach(({ id, bar, val }) => {
                document.getElementById(id).innerText = val;
                const barEl = document.getElementById(bar);
                barEl.style.width = "0%";
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    barEl.style.width = val + "%";
                }));
            });
            document.getElementById("dFeedback").innerText = evaluation.feedback || "No feedback.";

            // Show pill, open drawer
            document.getElementById("aiScorePill").style.display = "flex";
            openDrawer();
        }

        window.toggleDrawer = function () {
            if (window._drawerOpen) closeDrawer();
            else openDrawer();
        };

        function openDrawer() {
            document.getElementById("aiDrawer").classList.add("open");
            window._drawerOpen = true;
        }

        function closeDrawer() {
            document.getElementById("aiDrawer").classList.remove("open");
            window._drawerOpen = false;
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3500);
        }
    </script>

</body>

</html>
