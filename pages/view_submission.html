<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Submission - APLMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f5f7fb; color: #111827; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .navbar { height: 70px; background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; flex-shrink: 0; }
        .logo { display:flex; align-items:center; gap:10px; font-weight:600; text-decoration:none; color:#111827; }
        .logo-icon { width:32px; height:32px; background:#e6f9f2; border-radius:6px; display:flex; align-items:center; justify-content:center; color:#10b981; }
        .btn { padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; text-decoration:none; }
        .secondary { background: #f3f4f6; color: #374151; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .code-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #e5e7eb; background: #282a36; }
        .panel-header { background: #21222c; color: #f8f8f2; padding: 10px 20px; font-size: 13px; font-weight: 500; display: flex; justify-content: space-between; }
        .output-panel { width: 400px; background: #1e1e1e; color: #d4d4d4; display: flex; flex-direction: column; }
        .CodeMirror { height: 100% !important; font-size: 14px; }
        .terminal-content { flex: 1; padding: 20px; font-family: 'Consolas', monospace; font-size: 13px; overflow-y: auto; white-space: pre-wrap; }
    </style>
</head>
<body>
    <header class="navbar">
        <div style="display:flex; align-items:center; gap:20px;">
            <a href="javascript:history.back()" class="btn secondary">← Back</a>
            <div class="logo">
                <div class="logo-icon">&lt;/&gt;</div>
                <span id="navInfo">Submission View</span>
            </div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <span id="studentNameDisplay" style="font-weight:600; margin-right:10px;">Loading Student...</span>
            <button id="verifyBtn" class="btn primary" style="display:none; background:#10b981; color:white;">Verify Output</button>
            <span id="verifiedBadge" class="badge" style="display:none; background:#d1fae5; color:#059669; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:500;">Verified</span>
        </div>
    </header>

    <main class="main-container">
        <section class="code-panel">
            <div class="panel-header">
                <span id="assignmentTitle">Loading...</span>
                <span id="langDisplay">Language</span>
            </div>
            <textarea id="codeEditor"></textarea>
        </section>
        <section class="output-panel">
            <div class="panel-header" style="background:#252526; border-left: 1px solid #333;">Terminal Output</div>
            <div class="terminal-content" id="terminalOutput"></div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAcE_jpWoJT0_-Ltq8PNDD5aOivik6Gu1E",
            authDomain: "aplms-0001.firebaseapp.com",
            projectId: "aplms-0001",
            storageBucket: "aplms-0001.firebasestorage.app",
            messagingSenderId: "848681094849",
            appId: "1:848681094849:web:e8b9401ce5d5c78fec0e40"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const submissionId = urlParams.get('id');

        const editor = CodeMirror.fromTextArea(document.getElementById("codeEditor"), {
            lineNumbers: true,
            theme: "dracula",
            readOnly: true,
            mode: "javascript"
        });

        if (!submissionId) {
            alert("No submission ID!");
            window.location.href = "faculty_dashboard.html";
        } else {
            loadSubmission();
        }

        async function loadSubmission() {
            try {
                const subDoc = await getDoc(doc(db, "submissions", submissionId));
                if (!subDoc.exists()) {
                    alert("Submission not found!");
                    return;
                }
                const data = subDoc.data();
                
                document.getElementById("studentNameDisplay").innerText = data.studentName;
                document.getElementById("assignmentTitle").innerText = data.assignmentTitle;
                document.getElementById("terminalOutput").innerText = data.terminalOutput || "No terminal output recorded.";
                
                if (data.status === "verified") {
                    document.getElementById("verifiedBadge").style.display = "inline-block";
                    document.getElementById("verifyBtn").style.display = "none";
                } else if (data.status === "submitted") {
                    document.getElementById("verifyBtn").style.display = "inline-block";
                }

                // Set language mode
                const lang = (data.language || "").toLowerCase();
                let mode = "javascript";
                if (lang.includes("python")) mode = "python";
                else if (lang.includes("c++") || lang.includes("cpp")) mode = "text/x-c++src";
                else if (lang.includes("c")) mode = "text/x-csrc";
                else if (lang.includes("java")) mode = "text/x-java";
                
                editor.setOption("mode", mode);
                editor.setValue(data.code || "// No code submitted");
                document.getElementById("langDisplay").innerText = lang.toUpperCase();

            } catch (err) {
                console.error(err);
                alert("Error loading submission details.");
            }
        }

        import { updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        document.getElementById("verifyBtn").addEventListener("click", async () => {
            if (confirm("Confirm verification of this submission?")) {
                try {
                    const subRef = doc(db, "submissions", submissionId);
                    await updateDoc(subRef, {
                        status: "verified",
                        verifiedAt: serverTimestamp()
                    });
                    
                    // Also update in student's private area if possible
                    // Note: We need studentId from the submission data which we have in 'data'
                    const subSnap = await getDoc(subRef);
                    if (subSnap.exists()) {
                        const sData = subSnap.data();
                        await updateDoc(doc(db, "users", sData.studentId, "submissions", sData.assignmentId), {
                            status: "verified",
                            verifiedAt: serverTimestamp()
                        });
                    }

                    alert("Verified successfully!");
                    document.getElementById("verifiedBadge").style.display = "inline-block";
                    document.getElementById("verifyBtn").style.display = "none";
                } catch (err) {
                    console.error("Verification error:", err);
                    alert("Failed to verify submission.");
                }
            }
        });
    </script>
</body>
</html>
