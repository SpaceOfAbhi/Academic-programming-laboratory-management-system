<!DOCTYPE html>
<html>
<head>
<title>Experiment 1 - Student Submissions</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/dashboard.css">

</head>
<body>

<header class="navbar">
  <div style="display:flex; align-items:center; gap:20px;">
    <a href="javascript:history.back()" class="btn secondary" style="padding: 6px 12px; font-size: 13px; text-decoration: none; display: flex; align-items: center; gap: 5px; background: #e5e7eb; color: #374151; border-radius: 6px; font-weight: 500;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Back
    </a>
    <div class="logo">
      <div class="logo-icon">&lt;/&gt;</div>
      <span>AcadLab IDE</span>
      <span class="breadcrumb">
        Faculty Dashboard > Lab 3: File I/O Operations > Experiment 1
      </span>
    </div>
  </div>

  <div>
    <span id="facultyName">Loading...</span>
  </div>
</header>

<div class="container">

  <h1 id="assignmentTitle">Loading...</h1>
  <p class="subtitle">Student Submissions</p>

  <!-- SUMMARY BADGES -->
  <div class="summary-row">
    <span class="summary-box">Total Submissions: <strong id="totalCount">0</strong></span>
    <span class="badge evaluated" id="submittedCount">0 Final</span>
    <span class="badge pending" id="draftCount">0 In-Progress</span>
  </div>

  <!-- STUDENT LIST -->
  <div id="submissionsContainer">
      <p style="color:#6b7280; margin-top:20px;">Fetching submissions...</p>
  </div>

</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAcE_jpWoJT0_-Ltq8PNDD5aOivik6Gu1E",
      authDomain: "aplms-0001.firebaseapp.com",
      projectId: "aplms-0001",
      storageBucket: "aplms-0001.firebasestorage.app",
      messagingSenderId: "848681094849",
      appId: "1:848681094849:web:e8b9401ce5d5c78fec0e40"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Get Assignment ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const assignmentId = urlParams.get('id');

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists()) {
        const nameEl = document.getElementById("facultyName");
        if (nameEl) nameEl.innerText = userDoc.data().name || "Faculty";
      }

      if (!assignmentId) {
        alert("Experiment ID missing!");
        window.location.href = "faculty_dashboard.html";
        return;
      }

      loadSubmissions();
      loadAssignmentDetails();
    });

    async function loadAssignmentDetails() {
        const assignDoc = await getDoc(doc(db, "assignments", assignmentId));
        if (assignDoc.exists()) {
            const data = assignDoc.data();
            document.getElementById("assignmentTitle").innerText = data.title;
            
            // Fetch Lab details for breadcrumb
            if (data.lab_id) {
                const labDoc = await getDoc(doc(db, "labs", data.lab_id));
                if (labDoc.exists()) {
                    document.querySelector(".breadcrumb").innerText = `Faculty Dashboard > ${labDoc.data().title} > ${data.title}`;
                }
            } else {
                document.querySelector(".breadcrumb").innerText = `Faculty Dashboard > ${data.title}`;
            }
        }
    }

    async function loadSubmissions() {
        const container = document.getElementById("submissionsContainer");
        const totalEl = document.getElementById("totalCount");
        const submittedEl = document.getElementById("submittedCount");
        const draftEl = document.getElementById("draftCount");

        try {
            const q = query(collection(db, "submissions"), where("assignmentId", "==", assignmentId));
            const querySnapshot = await getDocs(q);
            
            container.innerHTML = "";
            let total = 0, submitted = 0, drafts = 0;

            if (querySnapshot.empty) {
                container.innerHTML = "<p style='color:#6b7280; margin-top:20px;'>No students have started this experiment yet.</p>";
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                total++;
                if (data.status === "submitted" || data.status === "verified") submitted++;
                else drafts++;

                const card = document.createElement("div");
                card.className = "student-card";
                
                const date = data.updatedAt ? data.updatedAt.toDate().toLocaleString() : "Unknown";
                let statusClass = "pending";
                let statusLabel = "Draft";
                
                if (data.status === "verified") {
                    statusClass = "evaluated";
                    statusLabel = "Verified ✔";
                } else if (data.status === "submitted") {
                    statusClass = "evaluated";
                    statusLabel = "Finalized";
                }

                // Build AI score badge HTML
                let aiScoreBadge = "";
                if (data.aiScore !== undefined && data.aiScore !== null) {
                    const s = data.aiScore;
                    let aiColor = "#ef4444"; let aiBg = "#fee2e2"; // red
                    if (s >= 80) { aiColor = "#059669"; aiBg = "#d1fae5"; }
                    else if (s >= 65) { aiColor = "#2563eb"; aiBg = "#dbeafe"; }
                    else if (s >= 50) { aiColor = "#b45309"; aiBg = "#fef9c3"; }
                    aiScoreBadge = `<span style="display:inline-flex;align-items:center;gap:5px;background:${aiBg};color:${aiColor};padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;margin-left:8px;" title="AI Evaluation Score">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
                        AI: ${s}/100
                    </span>`;
                }

                card.innerHTML = `
                    <div class="student-info">
                        <h4>${data.studentName || 'Student'}</h4>
                        <p>Last Activity: ${date}</p>
                    </div>
                    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;">
                        <span class="status ${statusClass}">${statusLabel}</span>
                        ${aiScoreBadge}
                        <a href="view_submission.html?id=${docSnap.id}" class="btn secondary" style="margin-left:8px; text-decoration:none;">View Code</a>
                    </div>
                `;
                container.appendChild(card);
            });

            totalEl.innerText = total;
            submittedEl.innerText = `${submitted} Final`;
            draftEl.innerText = `${drafts} In-Progress`;

        } catch (err) {
            console.error(err);
            container.innerHTML = "<p style='color:red;'>Error loading submissions.</p>";
        }
    }


  </script>
</body>
</html>
