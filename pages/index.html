<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AcadLab IDE - Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <div class="container">

        <div class="logo-box">
            <div class="logo-icon">&lt;/&gt;</div>
            <h1>APLMS</h1>
            <p class="subtitle">Academic Programming Laboratory Management System</p>
        </div>

        <div class="login-card">
            <h2>Sign in</h2>
            <p class="desc">Enter your credentials to access the lab</p>

            <form id="loginForm">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@acadalab.edu" required>

                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>

                <button type="submit">Sign In</button>
            </form>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAcE_jpWoJT0_-Ltq8PNDD5aOivik6Gu1E",
        authDomain: "aplms-0001.firebaseapp.com",
        projectId: "aplms-0001",
        storageBucket: "aplms-0001.firebasestorage.app",
        messagingSenderId: "848681094849",
        appId: "1:848681094849:web:e8b9401ce5d5c78fec0e40"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
            // 1️⃣ Authenticate
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 2️⃣ Fetch role from Firestore
            const userDoc = await getDoc(doc(db, "users", user.uid));

            if (!userDoc.exists()) {
                alert("User record not found in Firestore.");
                return;
            }

            const role = userDoc.data().role;

            // 3️⃣ Redirect based on role
            if (role === "student") {
                window.location.href = "student_dashboard.html";
            } else if (role === "faculty") {
                window.location.href = "faculty_dashboard.html";
            } else {
                alert("Invalid role assigned.");
            }

        } catch (error) {
            alert(error.message);
        }
    });
</script>
</body>

</html>
