<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AcadLab IDE - Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <div class="container">

        <div class="logo-box">
            <div class="logo-icon">&lt;/&gt;</div>
            <h1>APLMS</h1>
            <p class="subtitle">Academic Programming Laboratory Management System</p>
        </div>

        <div class="login-card">
            <h2>Sign in</h2>
            <p class="desc">Enter your credentials to access the lab</p>

            <form id="loginForm">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@acadalab.edu" required>

                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>

                <button type="submit">Sign In</button>
            </form>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Fetch config from main process
    const firebaseConfig = await window.electronAPI.getFirebaseConfig();

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Debugging
    window.onerror = (msg, url, line) => {
        console.error("Global Error:", msg, "at", url, ":", line);
    };

    let isRedirecting = false;

    // Proactive Redirect if already logged in
    onAuthStateChanged(auth, async (user) => {
        console.log("Auth state changed:", user ? "User detected" : "No user");
        
        if (user) {
            if (isRedirecting) return;
            isRedirecting = true;
            
            try {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const role = userDoc.data().role;
                    console.log("Redirecting to", role, "dashboard...");
                    if (role === "student") window.location.href = "student_dashboard.html";
                    else if (role === "faculty") window.location.href = "faculty_dashboard.html";
                    else if (role === "admin") window.location.href = "admin_dashboard.html";
                } else {
                    console.warn("User record missing in Firestore");
                    isRedirecting = false;
                }
            } catch (err) {
                console.error("Redirect check failed:", err);
                isRedirecting = false;
            }
        } else {
            // RESET UI state if logged out
            isRedirecting = false;
            const btn = document.querySelector("#loginForm button");
            if (btn) {
                btn.disabled = false;
                btn.innerText = "Sign In";
            }
        }
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        if (isRedirecting) return;

        const btn = e.target.querySelector('button');
        const originalText = btn.innerText;
        
        btn.innerText = "Signing in...";
        btn.disabled = true;

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            console.log("Login successful, waiting for redirect...");
            // onAuthStateChanged will handle the redirect
        } catch (error) {
            console.error("Login failed:", error.message);
            alert("Login failed: " + error.message);
            btn.innerText = originalText;
            btn.disabled = false;
        }
    });
</script>
</body>

</html>
